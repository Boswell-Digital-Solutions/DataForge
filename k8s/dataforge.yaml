apiVersion: v1
kind: Namespace
metadata:
  name: dataforge

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataforge-config
  namespace: dataforge
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "dataforge"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  ALLOWED_ORIGINS: "https://example.com,https://www.example.com"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: dataforge-secrets
  namespace: dataforge
type: Opaque
stringData:
  SECRET_KEY: ${SECRET_KEY}
  DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  VOYAGE_API_KEY: ${VOYAGE_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dataforge
  labels:
    app: dataforge
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: ankane/pgvector:latest
        ports:
        - containerPort: 5432
        
        env:
        - name: POSTGRES_DB
          value: dataforge
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dataforge-secrets
              key: DATABASE_PASSWORD
        
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2
            memory: 2Gi
        
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 5
          periodSeconds: 10
        
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: dataforge
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dataforge
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dataforge
  labels:
    app: dataforge
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
        - redis-server
        - "--requirepass"
        - $(REDIS_PASSWORD)
        - "--maxmemory"
        - "512mb"
        - "--maxmemory-policy"
        - "allkeys-lru"
        
        ports:
        - containerPort: 6379
        
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dataforge-secrets
              key: REDIS_PASSWORD
        
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 512Mi
        
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
        
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 10
        
        volumeMounts:
        - name: redis-data
          mountPath: /data
      
      volumes:
      - name: redis-data
        emptyDir: {}

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dataforge
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
# DataForge API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataforge-api
  namespace: dataforge
  labels:
    app: dataforge
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: dataforge-api
  
  template:
    metadata:
      labels:
        app: dataforge-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - dataforge-api
              topologyKey: kubernetes.io/hostname
      
      containers:
      - name: dataforge
        image: ghcr.io/boswecw/dataforge:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8001
        
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dataforge-secrets
              key: SECRET_KEY
        
        - name: DATABASE_URL
          value: postgresql://postgres:$(DATABASE_PASSWORD)@postgres:5432/dataforge
        
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dataforge-secrets
              key: DATABASE_PASSWORD
        
        - name: REDIS_URL
          value: redis://:$(REDIS_PASSWORD)@redis:6379/0
        
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dataforge-secrets
              key: REDIS_PASSWORD
        
        - name: VOYAGE_API_KEY
          valueFrom:
            secretKeyRef:
              name: dataforge-secrets
              key: VOYAGE_API_KEY
        
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: dataforge-config
              key: LOG_LEVEL
        
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: dataforge-config
              key: ENVIRONMENT
        
        resources:
          requests:
            cpu: 1
            memory: 1Gi
          limits:
            cpu: 2
            memory: 2Gi
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

---
# DataForge API Service
apiVersion: v1
kind: Service
metadata:
  name: dataforge-api
  namespace: dataforge
  labels:
    app: dataforge
spec:
  selector:
    app: dataforge-api
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  type: LoadBalancer

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dataforge-api-hpa
  namespace: dataforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dataforge-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dataforge-network-policy
  namespace: dataforge
spec:
  podSelector:
    matchLabels:
      app: dataforge-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx
    ports:
    - protocol: TCP
      port: 8001
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
