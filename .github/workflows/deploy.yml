name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'release-*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest
    
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # Template for Azure Container Instances deployment
  # Uncomment and configure for your cloud provider
  deploy-aci:
    if: false  # Disabled by default, enable when ready
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Container Instances
      uses: azure/aci-deploy-action@v1
      with:
        resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
        name: dataforge-app
        image: ${{ needs.build.outputs.image }}
        cpu: 2
        memory: 2
        registry-login-server: ${{ env.REGISTRY }}
        registry-username: ${{ github.actor }}
        registry-password: ${{ secrets.GITHUB_TOKEN }}
        environment-variables: |
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          DATAFORGE_DATABASE_URL=${{ secrets.DATAFORGE_DATABASE_URL }}
          VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}

  # Template for Kubernetes deployment
  # Uncomment and configure for your Kubernetes cluster
  deploy-k8s:
    if: false  # Disabled by default, enable when ready
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Deploy to Kubernetes
      run: |
        # Configure kubectl
        kubectl config use-context ${{ secrets.K8S_CONTEXT }}
        
        # Update deployment with new image
        kubectl set image deployment/dataforge-api \
          dataforge-api=${{ needs.build.outputs.image }} \
          -n production
        
        # Wait for rollout
        kubectl rollout status deployment/dataforge-api -n production

  # Template for AWS ECS deployment
  # Uncomment and configure for AWS
  deploy-ecs:
    if: false  # Disabled by default, enable when ready
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Update ECS service
      run: |
        aws ecs update-service \
          --cluster dataforge \
          --service dataforge-api \
          --force-new-deployment

  # Smoke tests after deployment
  smoke-test:
    if: false  # Disabled by default, enable when ready
    runs-on: ubuntu-latest
    needs: deploy-aci
    
    steps:
    - name: Wait for deployment
      run: sleep 30
    
    - name: Health check
      run: |
        for i in {1..30}; do
          if curl -f http://${{ secrets.DEPLOYMENT_URL }}/health; then
            echo "Health check passed"
            exit 0
          fi
          echo "Attempt $i failed, retrying..."
          sleep 10
        done
        exit 1
    
    - name: Smoke tests
      run: |
        # Run basic API tests
        curl -X GET http://${{ secrets.DEPLOYMENT_URL }}/api/projects
        curl -X GET http://${{ secrets.DEPLOYMENT_URL }}/health

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
    - name: Send Slack notification
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "DataForge Deployment ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*DataForge Deployment*\nStatus: ${{ job.status }}\nRef: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
