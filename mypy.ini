[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Ignore missing imports for third-party libraries without type stubs
# This prevents the 46 "Cannot find implementation or library stub" errors
ignore_missing_imports = True

# Alternatively, you can selectively ignore specific libraries:
# Uncomment the sections below and comment out the line above

# [mypy-fastapi.*]
# ignore_missing_imports = True

# [mypy-sqlalchemy.*]
# ignore_missing_imports = True

# [mypy-dotenv]
# ignore_missing_imports = True

# [mypy-pgvector.*]
# ignore_missing_imports = True

# [mypy-voyageai.*]
# ignore_missing_imports = True

# [mypy-jose.*]
# ignore_missing_imports = True

# [mypy-passlib.*]
# ignore_missing_imports = True

# [mypy-openai.*]
# ignore_missing_imports = True

# [mypy-uvicorn.*]
# ignore_missing_imports = True

# [mypy-alembic.*]
# ignore_missing_imports = True
