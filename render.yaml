# DataForge - Knowledge/Data Layer Service
# Render Blueprint for independent deployment
# Deploy: render blueprint apply

databases:
  - name: dataforge-db
    databaseName: dataforge
    user: dataforge
    plan: free

services:
  - type: web
    name: dataforge
    runtime: python
    repo: https://github.com/Boswecw/DataForge.git
    branch: master
    rootDir: .
    plan: free
    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install -e ./forge-telemetry
      pip install --no-cache-dir -r requirements.txt
      alembic upgrade head || {
        echo "⚠️  alembic upgrade failed — stamping current head and retrying"
        alembic stamp head
        alembic upgrade head
      }
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: ENVIRONMENT
        value: production
      - key: DATAFORGE_DATABASE_URL
        sync: false  # Set Supabase connection string in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false  # Set specific origins in Render dashboard, never use "*"
      - key: API_KEY_SALT
        generateValue: true  # Required for API key hashing
      - key: TOKEN_SALT
        generateValue: true  # Required for token hashing
      - key: SECRETS_ENCRYPTION_KEY
        generateValue: true  # Required for LLM secrets encryption
      - key: ROTATION_ADMIN_TOKEN
        generateValue: true  # Required for admin operations
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_PROVIDER
        value: voyage
      - key: EMBEDDING_MODEL
        value: voyage-2
