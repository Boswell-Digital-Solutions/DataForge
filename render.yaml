# DataForge - Knowledge/Data Layer Service
# Render Blueprint for independent deployment
# Deploy: render blueprint apply
# Database: Supabase (external) — set DATAFORGE_DATABASE_URL in Render dashboard

services:
  - type: web
    name: dataforge
    runtime: python
    repo: https://github.com/Boswecw/DataForge.git
    branch: master
    rootDir: .
    plan: free
    buildCommand: |
      python --version
      pip install --upgrade pip
      # Load the SSH deploy key (base64 env var SSH_KEY) so pip can fetch the
      # private forge-telemetry git+ssh dependency pinned in requirements.txt.
      mkdir -p ~/.ssh && chmod 700 ~/.ssh
      printf '%s' "$SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
      pip install --no-cache-dir -r requirements.txt
      chmod +x scripts/preflight.sh && bash scripts/preflight.sh
      alembic upgrade head
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers ${WEB_CONCURRENCY:-2} --bind 0.0.0.0:$PORT --timeout 60 --graceful-timeout 30 --keep-alive 5
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: ENVIRONMENT
        value: production
      - key: DATAFORGE_DATABASE_URL
        sync: false  # Set Supabase connection string in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false  # Set specific origins in Render dashboard, never use "*"
      - key: API_KEY_SALT
        generateValue: true  # Required for API key hashing
      - key: TOKEN_SALT
        generateValue: true  # Required for token hashing
      - key: SECRETS_ENCRYPTION_KEY
        generateValue: true  # Required for LLM secrets encryption
      - key: ROTATION_ADMIN_TOKEN
        generateValue: true  # Required for admin operations
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "2"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: EMBEDDING_PROVIDER
        value: voyage
      - key: EMBEDDING_MODEL
        value: voyage-2
      - key: NEUROFORGE_URL
        sync: false  # Cloud NeuroForge base URL for embeddings (POST /api/v1/embed),
                     # used by app/utils/embeddings.py for BOTH ingest + search query
                     # embedding. Defaults to http://127.0.0.1:8000 if unset, which
                     # 503s in prod. MUST be set to the deployed NeuroForge URL
                     # (e.g. https://neuroforge-9lxc.onrender.com).
