# DataForge - Knowledge/Data Layer Service
# Render Blueprint for independent deployment
# Deploy: render blueprint apply
# Database: Supabase (external) — set DATAFORGE_DATABASE_URL in Render dashboard

services:
  - type: web
    name: dataforge
    runtime: python
    repo: https://github.com/Boswell-Digital-Solutions/DataForge.git
    branch: master
    rootDir: .
    plan: free
    # Single token so a dashboard Build Command override (which flattens
    # newlines and breaks multi-line shell) can mirror this exactly:
    #   bash scripts/render-build.sh
    buildCommand: bash scripts/render-build.sh
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers ${WEB_CONCURRENCY:-2} --bind 0.0.0.0:$PORT --timeout 60 --graceful-timeout 30 --keep-alive 5
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: ENVIRONMENT
        value: production
      - key: FORGE_TELEMETRY_TOKEN
        sync: false  # Build-only GitHub token with Contents:Read on the pinned
                     # forge-telemetry and forge_contract_core repositories.
      - key: DATAFORGE_DATABASE_URL
        sync: false  # Set Supabase connection string in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false  # Set specific origins in Render dashboard, never use "*"
      - key: API_KEY_SALT
        generateValue: true  # Required for API key hashing
      - key: TOKEN_SALT
        generateValue: true  # Required for token hashing
      - key: SECRETS_ENCRYPTION_KEY
        generateValue: true  # Required for LLM secrets encryption
      - key: ROTATION_ADMIN_TOKEN
        generateValue: true  # Required for admin operations
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "2"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: EMBEDDING_PROVIDER
        value: voyage
      - key: EMBEDDING_MODEL
        value: voyage-2
      - key: NEUROFORGE_URL
        sync: false  # Cloud NeuroForge base URL for embeddings (POST /api/v1/embed),
                     # used by app/utils/embeddings.py for BOTH ingest + search query
                     # embedding. Defaults to http://127.0.0.1:8000 if unset, which
                     # 503s in prod. MUST be set to the deployed NeuroForge URL
                     # (e.g. https://neuroforge-9lxc.onrender.com).

  # Scheduled pull of Supabase logs → redacted durable evidence in DataForge.
  # NOTE: Render Cron Jobs require a paid plan. Free alternative: a scheduled
  # GitHub Actions workflow running `python -m scripts.poll_supabase_logs --once`
  # with the same env (DATAFORGE_DATABASE_URL + SUPABASE_* as repo secrets).
  - type: cron
    name: dataforge-supabase-log-poll
    runtime: python
    repo: https://github.com/Boswell-Digital-Solutions/DataForge.git
    branch: master
    rootDir: .
    schedule: "*/10 * * * *"  # every 10 min; lookback/overlap make windows safe to re-pull
    # The web build is the sole migration runner. This build verifies the
    # migration graph; the poller runtime separately verifies its table exists.
    buildCommand: bash scripts/render-cron-build.sh
    startCommand: python -m scripts.poll_supabase_logs --once
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: ENVIRONMENT
        value: production
      - key: FORGE_TELEMETRY_TOKEN
        sync: false  # Same build-only GitHub token as the web service.
      - key: LOG_LEVEL
        value: INFO
      - key: DATAFORGE_DATABASE_URL
        sync: false  # same Supabase connection string as the web service
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_ACCESS_TOKEN
        sync: false  # Supabase Management API token (account → access tokens)
      - key: SUPABASE_LOG_IDENTITY_SALT
        generateValue: true  # one-way hashing of auth_user; stable per environment
      - key: SUPABASE_LOG_SOURCE_TABLE
        value: edge_logs
