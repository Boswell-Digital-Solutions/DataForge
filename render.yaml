# DataForge - Knowledge/Data Layer Service
# Render Blueprint for independent deployment
# Deploy: render blueprint apply

databases:
  - name: dataforge-db
    databaseName: dataforge
    user: dataforge
    plan: free

services:
  - type: web
    name: dataforge
    runtime: python
    repo: https://github.com/Boswecw/DataForge.git
    branch: master
    rootDir: DataForge
    plan: free
    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install -e ../forge-telemetry
      pip install --only-binary=:all: --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dataforge-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: EMBEDDING_PROVIDER
        value: voyage
      - key: EMBEDDING_MODEL
        value: voyage-2
